<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Letters For You ❤️</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>30 Letters For You ❤️</h1>

    <div class="counter">
        Letter <span id="currentNumber">1</span> of
        <span id="totalLetters">30</span>
    </div>

    <div class="envelope-container">

        <div class="envelope fly-in" id="envelope">

            <div class="flap"></div>

            <div class="letter">
                <p id="message">
                    Click the envelope to open your first letter ❤️
                </p>
            </div>

        </div>

    </div>

    <div class="buttons">
        <button id="prevBtn">⬅ Previous</button>
        <button id="openBtn">💌 Open</button>
        <button id="nextBtn">Next ➡</button>
    </div>

    <script src="script.js"></script>

</body>
</html>
